[General]
network = blockreceive.simulations.BlockchainNetwork
sim-time-limit = 200s

*.numHosts = 10
*.configurator.config = xmldoc("ipv4.xml")
*.host[*].numApps = 1

*.host[*].app[0].typename = "BlockchainApp"

*.host[*].app[0].localPort = 1000
*.host[*].app[0].destPort = 1000
*.host[*].app[0].networkSize = ${numHosts=5}

[Config OneMiner]

*.host[*].app[0].isMiner = false

*.host[0].app[0].isMiner = true

*.host[*].app[0].miningInterval = 10s

[Config ThreeMiners]

*.host[*].app[0].isMiner = false

*.host[0].app[0].isMiner = true
*.host[1].app[0].isMiner = true
*.host[2].app[0].isMiner = true

*.host[*].app[0].miningInterval = 10s
[Config MixedMiners]

*.host[*].app[0].isMiner = false

*.host[0].app[0].isMiner = true
*.host[1].app[0].isMiner = true
*.host[2].app[0].isMiner = true

*.host[0].app[0].miningInterval = 5s
*.host[1].app[0].miningInterval = 10s
*.host[2].app[0].miningInterval = 20s


